    endian: big
  - name: accel_z
    type: int16
    endian: big
  - name: gyro_x
    type: int16
    endian: big
  - name: gyro_y
    type: int16
    endian: big
  - name: gyro_z
    type: int16
    endian: big
- name: RESP_HEARTBEAT
  msg_id: 14
  direction: rx
  payload:
  - name: uptime_ms
    type: uint32
    endian: big
