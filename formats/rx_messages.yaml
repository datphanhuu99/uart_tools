- name: RESP_ST_BOOT
  msg_id: 1
  direction: rx
  payload:
  - name: boot_count
    type: uint32
    endian: big
- name: RESP_ST_CFG_GET
  msg_id: 2
  direction: rx
  payload:
  - name: device_id
    type: uint32
    endian: little
  - name: feature_flags
    type: uint32
    endian: little
  - name: undervoltage_mv
    type: uint16
    endian: little
  - name: overvoltage_mv
    type: uint16
    endian: little
  - name: overcurrent_ma
    type: uint16
    endian: little
  - name: overtemp_cdeg
    type: int16
    endian: little
  - name: reserved
    type: bytes
    length: 24
- name: RESP_ST_CFG_DEFAULT
  msg_id: 3
  direction: rx
  payload:
  - name: status
    type: uint8
    enum:
      0: success
      1: error
- name: RESP_ST_CFG_EXAMPLE
  msg_id: 4
  direction: rx
  payload:
  - name: status
    type: uint8
    enum:
      0: success
      1: error
- name: RESP_ST_CFG_SET
  msg_id: 5
  direction: rx
  payload:
  - name: status
    type: uint8
    enum:
      0: success
      1: error
      2: len_too_short
      3: invalid_field
- name: RESP_ST_FAULT_ADD
  msg_id: 6
  direction: rx
  payload:
  - name: status
    type: uint8
    enum:
      0: success
      1: error
      2: len_too_short
- name: RESP_ST_FAULT_LIST
  msg_id: 7
  direction: rx
  payload:
  - name: count
    type: uint8
  - name: faults
    type: array
    count_field: count
    fields:
    - name: fault_code
      type: uint16
      endian: little
    - name: reserved0
      type: uint16
      endian: little
    - name: boot_count
      type: uint32
      endian: little
    - name: timestamp_ms
      type: uint32
      endian: little
- name: RESP_IMU_WHOAMI
  msg_id: 8
  direction: rx
  payload:
  - name: status
    type: uint8
    enum:
      0: success
      1: read_error
  - name: who_am_i
    type: uint8
- name: RESP_IMU_PWR
  msg_id: 9
  direction: rx
  payload:
  - name: status
    type: uint8
    enum:
      0: success
      1: read_error
  - name: power_mode
    type: uint8
- name: RESP_IMU_STATUS
  msg_id: 10
  direction: rx
  payload:
  - name: status
    type: uint8
    enum:
      0: success
      1: read_error
  - name: int_status
    type: uint8
- name: RESP_IMU_RAWHEX
  msg_id: 11
  direction: rx
  payload:
  - name: status
    type: uint8
    enum:
      0: success
      1: read_error
  - name: accel_x
    type: int16
    endian: big
  - name: accel_y
    type: int16
    endian: big
  - name: accel_z
    type: int16
    endian: big
  - name: gyro_x
    type: int16
    endian: big
  - name: gyro_y
    type: int16
    endian: big
  - name: gyro_z
    type: int16
    endian: big
- name: RESP_IMU_RAW_STREAM
  msg_id: 12
  direction: rx
  payload:
  - name: status
    type: uint8
    enum:
      0: success
      1: sensor_error
      2: len_too_short
      3: invalid_duration
  - name: power_mode
    type: uint8
  - name: accel_config0
    type: uint8
  - name: gyro_config0
    type: uint8
- name: STREAM_IMU_DATA
  msg_id: 140
  direction: rx
  payload:
  - name: accel_x
    type: int16
    endian: big
  - name: accel_y
    type: int16
    endian: big
  - name: accel_z
    type: int16
    endian: big
  - name: gyro_x
    type: int16
    endian: big
  - name: gyro_y
    type: int16
    endian: big
  - name: gyro_z
    type: int16
    endian: big
- name: RESP_HEARTBEAT
  msg_id: 14
  direction: rx
  payload:
  - name: uptime_ms
    type: uint32
    endian: big
- name: RESP_ST_FAULT_EXPORT
  msg_id: 15
  direction: rx
  payload:
  - name: status
    type: uint8
  - name: count
    type: uint8
  - name: faults
    type: array
    count_field: count
    fields:
    - name: fault_code
      type: uint16
      endian: big
    - name: boot_count
      type: uint32
      endian: big
    - name: timestamp_ms
      type: uint32
      endian: big
