- name: CMD_HELP
  msg_id: 0x00
  direction: tx

- name: CMD_ST_BOOT
  msg_id: 0x01
  direction: tx

- name: CMD_ST_CFG_GET
  msg_id: 0x02
  direction: tx

- name: CMD_ST_CFG_DEFAULT
  msg_id: 0x03
  direction: tx

- name: CMD_ST_CFG_EXAMPLE
  msg_id: 0x04
  direction: tx

- name: CMD_ST_CFG_SET
  msg_id: 0x05
  direction: tx
  payload:
    - name: field_id
      type: uint8
      enum:
        0: device_id
        1: feature_flags
        2: undervoltage_mv
        3: overvoltage_mv
        4: overcurrent_ma
        5: overtemp_cdeg
    - name: value
      type: uint32
      endian: big

- name: CMD_ST_FAULT_ADD
  msg_id: 0x06
  direction: tx
  payload:
    - name: fault_code
      type: uint16
      endian: big

- name: CMD_ST_FAULT_LIST
  msg_id: 0x07
  direction: tx

- name: CMD_IMU_WHOAMI
  msg_id: 0x08
  direction: tx

- name: CMD_IMU_PWR
  msg_id: 0x09
  direction: tx

- name: CMD_IMU_STATUS
  msg_id: 0x0a
  direction: tx

- name: CMD_IMU_RAWHEX
  msg_id: 0x0b
  direction: tx

- name: CMD_IMU_RAW_STREAM
  msg_id: 0x0c
  direction: tx
  payload:
    - name: duration_sec
      type: uint32
      endian: big

- name: CMD_IMU_SETPWR
  msg_id: 0x0d
  direction: tx
  payload:
    - name: mode
      type: uint8
      enum:
        0: sleep
        1: standby
        2: accel_lp
        3: gyro_lp
        4: 6axis_lp
        5: accel_ln
        6: gyro_ln
        7: 6axis_ln
